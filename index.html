<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. KMA Mill - Cloud Indent System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { klk: '#22c55e', klkdark: '#16a34a' } } }
        }
    </script>
    <style>
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
        body.is-admin .admin-table-cell { display: table-cell; }
        body { transition: background-color 0.5s ease; }
        .loading-shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 font-sans text-slate-900 dark:text-slate-100 overflow-hidden">

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        
        <aside class="hidden md:flex w-64 bg-white dark:bg-slate-800 border-r dark:border-slate-700 flex-col shadow-sm">
            <div class="p-8">
                <h1 class="text-xl font-black text-klk tracking-tighter uppercase flex items-center gap-2">
                    <i class="fas fa-leaf text-2xl"></i> PT. KMA Mill
                </h1>
                <p id="role-tag" class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Staff Mode</p>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="currentFilter='all'; renderTable();" class="w-full flex items-center px-4 py-3 bg-klk text-white rounded-xl shadow-md">
                    <i class="fas fa-th-large w-6"></i> Semua Pesanan
                </button>
                <div class="admin-only mt-6 px-4 py-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">Admin Tools</div>
                <button onclick="currentFilter='Pending'; renderTable();" class="admin-only w-full flex items-center px-4 py-3 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition">
                    <i class="fas fa-clock w-6 text-yellow-500"></i> Cek Pending
                </button>
            </nav>
            <div class="p-6 border-t dark:border-slate-700 space-y-3">
                <button onclick="toggleDarkMode()" class="w-full flex items-center justify-center gap-2 py-2 bg-slate-100 dark:bg-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-widest">
                    <i id="theme-icon" class="fas fa-sun"></i> <span id="theme-text">Terang</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="md:hidden bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 flex justify-between items-center">
                <h1 class="text-lg font-black text-klk uppercase">PT. KMA Mill</h1>
                <button onclick="toggleAdmin()" class="text-slate-400"><i class="fas fa-lock text-sm"></i></button>
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-10">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
                    <div>
                        <h2 class="text-3xl font-extrabold text-slate-800 dark:text-white tracking-tight">Cloud Indent Barang</h2>
                        <p class="text-slate-500 dark:text-slate-400 mt-1 font-medium italic">Data tersinkronisasi otomatis ke Database Pusat.</p>
                    </div>
                    <button onclick="openModal()" class="w-full md:w-auto bg-klk hover:bg-klkdark text-white px-8 py-4 rounded-2xl font-bold shadow-xl shadow-green-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <i class="fas fa-plus-circle text-lg"></i> Buat Pesanan
                    </button>
                </div>

                <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left" id="orderTable">
                            <thead>
                                <tr class="bg-slate-50/50 dark:bg-slate-700/50 border-b dark:border-slate-700 text-[11px] font-black text-slate-400 uppercase tracking-widest">
                                    <th class="px-8 py-5">Tanggal</th>
                                    <th class="px-8 py-5">Pemesan</th>
                                    <th class="px-8 py-5">Nama Barang</th>
                                    <th class="px-8 py-5 text-center">Jumlah</th>
                                    <th class="px-8 py-5 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-50 dark:divide-slate-700 font-medium italic">
                                <tr><td colspan="5" class="p-10 text-center animate-pulse">Menghubungkan ke Database...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button onclick="toggleAdmin()" class="fixed bottom-6 right-6 w-12 h-12 bg-white dark:bg-slate-800 border dark:border-slate-600 rounded-full shadow-lg flex items-center justify-center text-slate-300 hover:text-klk transition-all">
        <i id="lock-icon" class="fas fa-lock text-xs"></i>
    </button>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 hidden bg-blur flex items-end md:items-center justify-center z-50 p-0 md:p-4">
        <div class="bg-white dark:bg-slate-800 rounded-t-[2.5rem] md:rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden animate-slide-up">
            <div class="p-8 border-b dark:border-slate-700 flex justify-between items-center">
                <h3 class="text-xl font-extrabold text-slate-800 dark:text-white">Form Pesanan</h3>
                <button onclick="closeModal()" class="text-slate-400 text-2xl">&times;</button>
            </div>
            <form id="orderForm" class="p-8 space-y-5">
                <input type="text" id="nama" required class="w-full bg-slate-50 dark:bg-slate-700 border-2 border-slate-100 dark:border-slate-600 rounded-2xl p-4 focus:border-klk outline-none dark:text-white" placeholder="Nama Pemesan">
                <input type="text" id="barang" required class="w-full bg-slate-50 dark:bg-slate-700 border-2 border-slate-100 dark:border-slate-600 rounded-2xl p-4 focus:border-klk outline-none dark:text-white" placeholder="Nama Barang">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="jumlah" value="1" min="1" required class="bg-slate-50 dark:bg-slate-700 border-2 border-slate-100 dark:border-slate-600 rounded-2xl p-4 focus:border-klk outline-none font-bold dark:text-white">
                    <input type="text" id="satuan" required class="bg-slate-50 dark:bg-slate-700 border-2 border-slate-100 dark:border-slate-600 rounded-2xl p-4 focus:border-klk outline-none font-bold dark:text-white" placeholder="Pcs/Box">
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-klk text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-klkdark shadow-lg">Kirim Ke Database</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzg0bS9ScLtKqpWuqxt7Fi1j_lwZIi_2Uib2r0fuBeoPQ0FNOpVKgkc9bej-LTbtzJ3/exec";
        let orders = [];
        let isAdmin = false;
        let currentFilter = 'all';

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const rawData = await response.json();
                // Map data dari Sheets [Tgl, Nama, Barang, Jml, Sat, Stat]
                orders = rawData.map(row => ({
                    tanggal: row[0], nama: row[1], barang: row[2], 
                    jumlah: row[3], satuan: row[4], status: row[5]
                }));
                renderTable();
            } catch (e) { console.error("Gagal ambil data:", e); }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            const displayData = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter);

            displayData.forEach((order, index) => {
                let statusColor = "bg-yellow-50 text-yellow-600 dark:bg-yellow-900/20 dark:text-yellow-400";
                if(order.status === 'Indent') statusColor = "bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400";
                if(order.status === 'Selesai') statusColor = "bg-green-50 text-klk dark:bg-green-900/20 dark:text-klk";

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 dark:hover:bg-slate-700/50 transition border-b dark:border-slate-700";
                tr.innerHTML = `
                    <td class="px-8 py-5 text-[11px] text-slate-400 font-mono">${order.tanggal}</td>
                    <td class="px-8 py-5 font-bold text-slate-700 dark:text-slate-200">${order.nama}</td>
                    <td class="px-8 py-5 text-slate-600 dark:text-slate-400">${order.barang}</td>
                    <td class="px-8 py-5 text-center font-black">${order.jumlah} <span class="text-[9px] opacity-40 font-normal">${order.satuan}</span></td>
                    <td class="px-8 py-5 text-center">
                        ${isAdmin ? 
                            `<select onchange="updateStatusRemote('${order.nama}', '${order.barang}', this.value)" class="${statusColor} text-[10px] font-black uppercase px-3 py-1 rounded-full outline-none cursor-pointer">
                                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Indent" ${order.status === 'Indent' ? 'selected' : ''}>Indent</option>
                                <option value="Selesai" ${order.status === 'Selesai' ? 'selected' : ''}>Selesai</option>
                            </select>` : 
                            `<span class="${statusColor} px-4 py-1.5 rounded-full text-[10px] font-black uppercase">${order.status}</span>`
                        }
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('orderForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Mengirim...";
            btn.disabled = true;

          // Di dalam file index.html Anda cari bagian ini:
const d = new Date();
const tglString = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;

const payload = {
    tanggal: tglString, // Kirim teks biasa saja, biarkan Apps Script yang kasih tanda petik (')
    nama: document.getElementById('nama').value,
    barang: document.getElementById('barang').value,
    jumlah: document.getElementById('jumlah').value,
    satuan: document.getElementById('satuan').value,
    status: 'Pending'
};
            };

            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            closeModal();
            btn.innerText = "Kirim Ke Database";
            btn.disabled = false;
            fetchData(); // Refresh data
        };

        async function updateStatusRemote(nama, barang, statusBaru) {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'update', nama: nama, barang: barang, status: statusBaru })
            });
            fetchData();
        }

        function toggleAdmin() {
            if (!isAdmin) {
                if (prompt("Password Admin:") === "KLK2026") {
                    isAdmin = true;
                    document.body.classList.add('is-admin');
                    document.getElementById('role-tag').innerText = "Admin Mode";
                    document.getElementById('lock-icon').className = "fas fa-lock-open text-klk";
                }
            } else {
                isAdmin = false;
                document.body.classList.remove('is-admin');
                document.getElementById('role-tag').innerText = "Staff Mode";
            }
            renderTable();
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            document.getElementById('theme-text').innerText = isDark ? 'Terang' : 'Gelap';
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        // Initial Load & Auto Refresh
        fetchData();
        setInterval(fetchData, 10000); // Sinkronkan data setiap 10 detik
    </script>
</body>
</html>
